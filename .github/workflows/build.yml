name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm run package:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: sudo apt-get install -y ruby ruby-dev && sudo gem install fpm --no-document
      - run: pnpm install
      - run: pnpm exec electron-vite build && pnpm exec electron-builder --linux deb AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: release/*.{deb,AppImage}
