name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Stage Windows installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item src-tauri/target/release/bundle/nsis/*.exe staging/
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: staging/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build --bundles deb,appimage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Stage Linux packages
        run: |
          mkdir -p staging
          cp src-tauri/target/release/bundle/deb/*.deb staging/
          cp src-tauri/target/release/bundle/appimage/*.AppImage staging/
          ls -lah staging/
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: staging/*
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Tauri system dependencies
        run: brew install gtk+3 libadwaita
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build --bundles dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Stage macOS packages
        run: |
          mkdir -p staging
          cp src-tauri/target/release/bundle/dmg/*.dmg staging/
          ls -lah staging/
      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: staging/*

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Flatten release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp -f {} release-assets/ \;
          ls -lah release-assets/
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
